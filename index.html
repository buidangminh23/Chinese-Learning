<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>汉语学堂 - Học Tiếng Trung</title>
<meta name="description" content="Ứng dụng học tiếng Trung miễn phí với HSK 1-6, luyện nghe, viết, flashcard và mini game.">
<meta name="theme-color" content="#090e17">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--green:#58CC02;--green-dark:#46a302;--green-light:#89E219;
--blue:#1CB0F6;--blue-dark:#1899D6;
--red:#FF4B4B;--red-dark:#EA2B2B;
--orange:#FF9600;--yellow:#FFC800;
--purple:#CE82FF;--pink:#FF86D0;
--bg:#131F24;--bg2:#1a2b32;--bg3:#233a44;
--card:#1e3340;--card2:#264653;
--text:#fff;--text2:#ffffffcc;--text3:#ffffff88;
--gold:#FFD700;
--radius:16px;--radius-sm:12px;
--sidebar-w:220px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;display:flex}
.cn{font-family:'Noto Sans SC','Inter',sans-serif}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* ===== SIDEBAR NAV ===== */
.nav{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:2px solid var(--bg3);display:flex;flex-direction:column;padding:20px 12px;z-index:100;overflow-y:auto}
.nav-brand{text-align:center;margin-bottom:24px;padding:12px}
.nav-brand h1{font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--green),var(--green-light));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.nav-brand .subtitle{font-size:11px;color:var(--text3);margin-top:4px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:.2s;color:var(--text3);font-size:14px;font-weight:600;margin-bottom:4px}
.nav-item:hover{color:var(--green);background:rgba(88,204,2,.05)}
.nav-item.active{color:var(--green);background:rgba(88,204,2,.12)}
.nav-icon{font-size:22px;width:28px;text-align:center}
.nav-stats{margin-top:auto;padding:16px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--bg3)}
.nav-stats .stat{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;margin-bottom:8px}
.nav-stats .stat:last-child{margin-bottom:0}

/* ===== MAIN CONTENT ===== */
.main-wrap{margin-left:var(--sidebar-w);flex:1;min-height:100vh;overflow-y:auto}
.header{position:sticky;top:0;background:var(--bg);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;z-index:50;border-bottom:1px solid var(--bg3)}
.header h2{font-size:20px;font-weight:800}
.header-actions{display:flex;gap:12px;align-items:center}

/* Screens */
.screen{display:none;padding:20px 28px 40px}
.screen.active{display:block}

/* ===== HOME - Lesson Map ===== */
.level-section{margin-bottom:28px}
.level-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:16px 20px;background:linear-gradient(135deg,var(--card),var(--card2));border-radius:var(--radius);border:1px solid var(--bg3)}
.level-badge{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#fff;flex-shrink:0}
.level-badge.hsk1{background:linear-gradient(135deg,#58CC02,#89E219)}
.level-badge.hsk2{background:linear-gradient(135deg,#1CB0F6,#49C0F8)}
.level-badge.hsk3{background:linear-gradient(135deg,#FF9600,#FFC800)}
.level-badge.hsk4{background:linear-gradient(135deg,#FF4B4B,#FF6B6B)}
.level-badge.hsk5{background:linear-gradient(135deg,#CE82FF,#E0A8FF)}
.level-badge.hsk6{background:linear-gradient(135deg,#FF86D0,#FFB6E1)}
.level-info h2{font-size:18px;font-weight:800}
.level-info p{font-size:13px;color:var(--text3);margin-top:2px}
.level-progress{margin-left:auto;text-align:right}
.level-progress .pct{font-size:20px;font-weight:800;color:var(--green)}
.level-progress .label{font-size:11px;color:var(--text3)}

/* Lesson path */
.lesson-path{display:flex;flex-direction:row;align-items:center;gap:0;padding:8px 0;overflow-x:auto;flex-wrap:wrap}
.lesson-node{position:relative;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;transition:.3s;border:3px solid;flex-shrink:0}
.lesson-node.locked{background:var(--bg3);border-color:var(--bg3);color:var(--text3);cursor:not-allowed;opacity:.5}
.lesson-node.available{background:var(--green);border-color:var(--green-dark);color:#fff;animation:pulse 2s infinite}
.lesson-node.completed{background:var(--gold);border-color:#daa520;color:#333}
.lesson-node:not(.locked):hover{transform:scale(1.15)}
.lesson-connector{width:16px;height:3px;background:var(--bg3);flex-shrink:0}
.lesson-connector.done{background:var(--gold)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(88,204,2,.4)}50%{box-shadow:0 0 0 10px rgba(88,204,2,0)}}

/* ===== LESSON SCREEN ===== */
.lesson-screen{position:fixed;inset:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.lesson-screen.active{display:flex}
.lesson-top{padding:16px 28px;display:flex;align-items:center;gap:16px}
.lesson-close{width:40px;height:40px;border-radius:50%;border:2px solid var(--bg3);background:none;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.progress-bar{flex:1;height:16px;background:var(--bg3);border-radius:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--green-light));border-radius:8px;transition:.5s}
.lesson-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
.lesson-bottom{padding:20px;max-width:600px;margin:0 auto;width:100%}

/* Question */
.question-type{font-size:14px;color:var(--text3);font-weight:600;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.question-prompt{font-size:36px;font-weight:800;margin-bottom:8px;text-align:center}
.question-sub{font-size:18px;color:var(--text2);margin-bottom:32px;text-align:center}
.question-pinyin{font-size:20px;color:var(--green);font-weight:600;margin-bottom:24px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:600px}
.option{padding:18px;background:var(--card);border:2px solid var(--bg3);border-radius:var(--radius-sm);font-size:17px;font-weight:600;cursor:pointer;transition:.2s;text-align:center;color:var(--text)}
.option:hover{border-color:var(--blue);background:rgba(28,176,246,.1)}
.option.selected{border-color:var(--blue);background:rgba(28,176,246,.15)}
.option.correct{border-color:var(--green)!important;background:rgba(88,204,2,.15)!important;color:var(--green)!important}
.option.wrong{border-color:var(--red)!important;background:rgba(255,75,75,.15)!important;color:var(--red)!important}
.type-input{width:100%;max-width:500px;padding:16px;background:var(--card);border:2px solid var(--bg3);border-radius:var(--radius-sm);color:var(--text);font-size:18px;font-family:'Inter',sans-serif;outline:none;text-align:center}
.type-input:focus{border-color:var(--blue)}

/* Sentence Builder */
.sentence-builder-area{min-height:80px;width:100%;max-width:600px;border-bottom:2px dashed var(--bg3);margin-bottom:24px;display:flex;flex-wrap:wrap;gap:8px;padding-bottom:12px}
.word-chip{padding:12px 18px;border-radius:var(--radius-sm);border:2px solid var(--bg3);background:var(--card);font-size:20px;font-weight:700;cursor:pointer;transition:.2s;user-select:none;color:var(--text)}
.word-chip:hover{border-color:var(--blue);background:rgba(28,176,246,.1);transform:translateY(-2px)}
.word-chip.selected{opacity:.3;pointer-events:none;transform:scale(0.95)}
.chip-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;width:100%;max-width:600px}

/* Buttons */
.btn{padding:14px 32px;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Inter',sans-serif}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-dark)}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:active{box-shadow:none;transform:translateY(4px)}
.btn-primary:disabled{background:var(--bg3);box-shadow:0 4px 0 #1a2a33;cursor:not-allowed}
.btn-full{width:100%}
.btn-secondary{background:var(--card);color:var(--text);border:2px solid var(--bg3)}
.btn-sm{padding:8px 16px;font-size:13px}

/* Result banner */
.result-banner{position:fixed;bottom:0;left:0;right:0;padding:24px 28px;z-index:210;animation:slideUp .3s}
.result-banner.correct{background:#1a3a1a;border-top:3px solid var(--green)}
.result-banner.wrong{background:#3a1a1a;border-top:3px solid var(--red)}
.result-banner h3{font-size:20px;font-weight:800;margin-bottom:4px}
.result-banner.correct h3{color:var(--green)}
.result-banner.wrong h3{color:var(--red)}
.result-banner p{color:var(--text2);font-size:14px;margin-bottom:16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* Lesson complete */
.complete-screen{text-align:center;padding:40px 20px}
.complete-icon{font-size:80px;margin-bottom:20px}
.complete-title{font-size:28px;font-weight:900;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.complete-stats{display:flex;justify-content:center;gap:32px;margin:24px 0}
.complete-stat{text-align:center}
.complete-stat .val{font-size:24px;font-weight:800}
.complete-stat .lbl{font-size:12px;color:var(--text3)}

/* Pinyin */
.pinyin-section{padding:0}
.pinyin-section h2{font-size:20px;font-weight:800;margin-bottom:16px;color:var(--green)}
.pinyin-section h3{font-size:16px;font-weight:700;margin:16px 0 8px;color:var(--text2)}
.tone-demo{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.tone-card{padding:12px 20px;background:var(--card);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:.2s;border:2px solid var(--bg3);min-width:70px}
.tone-card:hover{border-color:var(--green);transform:translateY(-2px)}
.tone-card .char{font-size:24px;font-weight:700}
.tone-card .name{font-size:11px;color:var(--text3);margin-top:4px}
.pinyin-table{width:100%;border-collapse:separate;border-spacing:4px;margin:12px 0}
.pinyin-table th{background:var(--green);color:#fff;padding:8px;border-radius:6px;font-size:13px}
.pinyin-table td{background:var(--card);padding:8px;border-radius:6px;text-align:center;font-size:14px;cursor:pointer;transition:.2s;border:1px solid var(--bg3)}
.pinyin-table td:hover{background:var(--card2);border-color:var(--green)}

/* Grammar */
.grammar-card{background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.grammar-card h3{font-size:18px;font-weight:800;color:var(--blue);margin-bottom:8px}
.grammar-card .formula{background:rgba(28,176,246,.1);color:var(--blue);padding:10px 14px;border-radius:8px;font-weight:700;font-size:15px;margin-bottom:12px;font-family:monospace}
.grammar-card .note{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5;background:rgba(255,150,0,.1);border-left:4px solid var(--orange);padding:10px}
.grammar-card .example{margin-bottom:8px}
.grammar-card .example .zh{font-size:18px;color:var(--text);font-weight:600;margin-bottom:2px}
.grammar-card .example .py{font-size:13px;color:var(--green);margin-bottom:2px}
.grammar-card .example .vn{font-size:13px;color:var(--text3)}

/* Review */
.review-card{background:var(--card);border-radius:var(--radius);padding:24px;margin:12px 0;border:1px solid var(--bg3);text-align:center}
.review-card .hanzi{font-size:48px;font-weight:700;margin-bottom:8px}
.review-card .pinyin{font-size:20px;color:var(--green);margin-bottom:8px}
.review-card .meaning{font-size:16px;color:var(--text2)}
.review-actions{display:flex;gap:12px;justify-content:center;margin-top:20px}

/* Stats */
.stat-card{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:var(--radius);padding:20px;border:1px solid var(--bg3)}
.stat-card h3{font-size:14px;color:var(--text3);margin-bottom:8px}
.stat-card .val{font-size:32px;font-weight:900}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.hsk-progress{padding:12px 0}
.hsk-bar{display:flex;align-items:center;gap:12px;margin:8px 0}
.hsk-bar .label{width:50px;font-weight:700;font-size:14px}
.hsk-bar .bar{flex:1;height:12px;background:var(--bg3);border-radius:6px;overflow:hidden}
.hsk-bar .fill{height:100%;border-radius:6px;transition:.5s}
.hsk-bar .pct{width:40px;text-align:right;font-size:13px;font-weight:600;color:var(--text3)}

/* Search & Vocab */
.search-box{padding:0;margin-bottom:16px}
.search-input{width:100%;padding:12px 16px;background:var(--card);border:2px solid var(--bg3);border-radius:var(--radius-sm);color:var(--text);font-size:15px;outline:none;font-family:'Inter',sans-serif}
.search-input:focus{border-color:var(--green)}
.word-list{padding:0}
.word-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:.2s;border:1px solid var(--bg3)}
.word-item:hover{border-color:var(--green);background:var(--card2)}
.word-item .hz{font-size:24px;font-weight:700;min-width:60px}
.word-item .py{font-size:14px;color:var(--green);font-weight:500}
.word-item .mn{font-size:14px;color:var(--text2);margin-left:auto}
.word-item .hsk-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700;color:#fff}

/* Vocab Browser */
.vocab-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.vocab-tab{padding:8px 20px;border-radius:20px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;border:2px solid var(--bg3);background:var(--card);color:var(--text3)}
.vocab-tab:hover{border-color:var(--green);color:var(--text)}
.vocab-tab.active{border-color:var(--green);background:var(--green);color:#fff}
.vocab-count{font-size:12px;color:var(--text3);margin-bottom:16px;font-weight:600}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.vocab-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--bg3);cursor:pointer;transition:.2s}
.vocab-card:hover{border-color:var(--green);background:var(--card2);transform:translateY(-1px)}
.vocab-card .v-hz{font-size:22px;font-weight:700;min-width:50px;text-align:center}
.vocab-card .v-info{flex:1;min-width:0}
.vocab-card .v-py{font-size:13px;color:var(--green);font-weight:500}
.vocab-card .v-vn{font-size:13px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vocab-card .v-speak{width:32px;height:32px;border-radius:50%;background:rgba(88,204,2,.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:.2s}
.vocab-card:hover .v-speak{background:var(--green)}
.vocab-audio-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.audio-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--bg3);background:var(--card2);color:var(--text);cursor:pointer;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;transition:.2s}
.audio-btn:hover{border-color:var(--green);transform:translateY(-1px)}
.audio-btn.slow{color:var(--yellow)}
.vocab-num{font-size:11px;color:var(--text3);font-weight:600;min-width:28px;text-align:center}

/* Confetti */
.confetti{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300}

/* Shake */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s}

/* UI OVERRIDES */
:root{
--green:#00e5ff;--green-dark:#00a3cc;--green-light:#80f2ff;
--blue:#1CB0F6;--blue-dark:#1899D6;
--red:#ff2a5f;--red-dark:#cc0033;
--yellow:#FFD700;--gold:#FFA000;
--bg:#090e17;--bg2:rgba(18,25,40,0.7);--bg3:rgba(30,45,70,0.6);
--card:rgba(20,28,45,0.65);--card2:rgba(25,36,58,0.8);
--glass-border: 1px solid rgba(255,255,255,0.08);
--shadow-glow: 0 8px 32px rgba(0,229,255,0.15);
--radius: 20px;
}
body{background-image:radial-gradient(circle at 10% 20%,rgba(0,229,255,0.05),transparent 30%),radial-gradient(circle at 90% 80%,rgba(206,130,255,0.05),transparent 30%)}
.nav{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-right:var(--glass-border);box-shadow:4px 0 24px rgba(0,0,0,0.2)}
.header{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:var(--glass-border);background:var(--bg2)}
.screen{animation:fadeUp .5s cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));box-shadow:0 4px 0 rgba(0,163,204,1),0 8px 20px rgba(0,229,255,.3);text-shadow:0 1px 2px rgba(0,0,0,.2)}
.btn-primary:active{box-shadow:0 0 0 rgba(0,163,204,1),0 0 0 rgba(0,229,255,0);transform:translateY(4px)}
.level-header{backdrop-filter:blur(12px);border:var(--glass-border);box-shadow:0 8px 24px rgba(0,0,0,.2);transition:.3s}
.level-header:hover{transform:translateY(-3px);box-shadow:var(--shadow-glow)}
.lesson-node{transition:all .4s cubic-bezier(.175,.885,.32,1.275);border-width:4px;box-shadow:0 4px 10px rgba(0,0,0,.3);width:64px;height:64px;font-size:16px}
.lesson-node.available{background:var(--card);color:var(--green);border-color:var(--green);box-shadow:0 0 20px rgba(0,229,255,.4),inset 0 0 10px rgba(0,229,255,.2);animation:neonPulse 2s infinite}
.lesson-node.completed{background:linear-gradient(135deg,var(--yellow),var(--gold));border-color:#d49a00;color:#000;box-shadow:0 0 15px rgba(255,215,0,.3)}
@keyframes neonPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,.4),inset 0 0 10px rgba(0,229,255,.2)}50%{box-shadow:0 0 0 12px rgba(0,229,255,0),inset 0 0 20px rgba(0,229,255,.6)}}

/* Dashboard Widgets */
.dashboard-widgets{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.widget{background:var(--card);backdrop-filter:blur(12px);border:var(--glass-border);border-radius:var(--radius);padding:24px;display:flex;align-items:center;gap:20px;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:.3s;cursor:pointer}
.widget:hover{transform:translateY(-4px);box-shadow:var(--shadow-glow);border-color:rgba(0,229,255,.3)}
.widget-info h3{font-size:15px;color:var(--text3);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px}
.widget-info p{font-size:20px;font-weight:800;color:var(--text)}
.widget-info .sub{font-size:13px;color:var(--green);margin-top:4px;font-weight:600}
.widget-icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;box-shadow:0 4px 15px rgba(206,130,255,.4)}
@media(max-width:768px){.dashboard-widgets{grid-template-columns:1fr}.nav{display:none}.main-wrap{margin-left:0}}

/* ===== LIGHT MODE ===== */
body.light{--bg:#f0f2f5;--bg2:#ffffff;--bg3:#d0d5dd;--card:#ffffff;--card2:#f5f7fa;--text:#1a1a2e;--text2:#444;--text3:#888;--glass-border:1px solid #e0e0e0;--shadow-glow:0 8px 32px rgba(0,0,0,.08)}
body.light{background-image:radial-gradient(circle at 10% 20%,rgba(0,150,200,.04),transparent 30%),radial-gradient(circle at 90% 80%,rgba(150,50,200,.03),transparent 30%)}
body.light .nav{box-shadow:2px 0 12px rgba(0,0,0,.06)}
body.light .header{box-shadow:0 2px 8px rgba(0,0,0,.04)}
body.light .lesson-screen{background:var(--bg)}
body.light .result-banner.correct{background:#e8f5e9;border-top:3px solid #4caf50}
body.light .result-banner.wrong{background:#fce4ec;border-top:3px solid #e91e63}
body.light .btn-secondary{background:var(--card);color:var(--text);border:2px solid var(--bg3)}

/* ===== THEME TOGGLE ===== */
.theme-toggle{width:44px;height:24px;border-radius:12px;background:var(--bg3);position:relative;cursor:pointer;transition:.3s;border:none;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s}
body.light .theme-toggle{background:var(--green)}
body.light .theme-toggle::after{left:23px}

/* ===== BOOKMARK STAR ===== */
.bm-star{cursor:pointer;font-size:18px;opacity:.3;transition:.2s;flex-shrink:0}
.bm-star:hover{opacity:.7;transform:scale(1.2)}
.bm-star.active{opacity:1;color:var(--yellow)}

/* ===== POS FILTER ===== */
.pos-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pos-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--bg3);background:var(--card);color:var(--text3);transition:.2s}
.pos-pill:hover{border-color:var(--green);color:var(--text)}
.pos-pill.active{background:var(--green);color:#fff;border-color:var(--green)}

/* ===== WRITING CANVAS ===== */
.writing-wrap{display:flex;flex-direction:column;align-items:center;gap:20px}
.writing-canvas-container{position:relative;width:300px;height:300px;border-radius:var(--radius);border:2px solid var(--bg3);background:var(--card);overflow:hidden}
.writing-canvas-container canvas{position:absolute;top:0;left:0}
.writing-guide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:200px;color:var(--bg3);pointer-events:none;font-family:'Noto Sans SC',sans-serif;font-weight:700}
.writing-grid{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.writing-grid::before,.writing-grid::after{content:'';position:absolute;background:var(--bg3)}
.writing-grid::before{width:1px;height:100%;left:50%;opacity:.3}
.writing-grid::after{height:1px;width:100%;top:50%;opacity:.3}

/* ===== GAME BOARD ===== */
.game-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:600px;margin:0 auto}
.game-card-wrap{aspect-ratio:1;perspective:600px}
.game-card{width:100%;height:100%;border-radius:var(--radius-sm);cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .5s}
.game-card.flipped{transform:rotateY(180deg)}
.game-card.matched{opacity:.5;pointer-events:none}
.game-card-face{position:absolute;inset:0;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;backface-visibility:hidden;border:2px solid var(--bg3);font-weight:700}
.game-card-front{background:linear-gradient(135deg,var(--card),var(--card2));font-size:32px}
.game-card-back{background:var(--card);transform:rotateY(180deg);flex-direction:column;gap:4px;padding:8px}
.game-card-back .g-hz{font-size:24px}
.game-card-back .g-py{font-size:11px;color:var(--green)}
.game-card-back .g-vn{font-size:10px;color:var(--text3)}

/* ===== CHART ===== */
.chart-container{padding:16px;background:var(--card);border-radius:var(--radius);border:1px solid var(--bg3);margin:12px 0}
.chart-bars{display:flex;gap:4px;align-items:flex-end;height:120px;padding:8px 0}
.chart-bar{flex:1;background:linear-gradient(to top,var(--green-dark),var(--green));border-radius:4px 4px 0 0;transition:.3s;min-width:8px;position:relative}
.chart-bar:hover{filter:brightness(1.3)}
.chart-bar .chart-tip{display:none;position:absolute;top:-24px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--text);white-space:nowrap;background:var(--card2);padding:2px 6px;border-radius:4px}
.chart-bar:hover .chart-tip{display:block}
.chart-labels{display:flex;gap:4px;margin-top:4px}
.chart-labels span{flex:1;text-align:center;font-size:9px;color:var(--text3);min-width:8px;overflow:hidden}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--bg2);border-radius:var(--radius);padding:32px;max-width:500px;width:90%;border:var(--glass-border);box-shadow:var(--shadow-glow)}
.modal h2{font-size:20px;font-weight:800;margin-bottom:16px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== RADICALS ===== */
.radical-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
.radical-card{padding:12px 8px;background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:.2s}
.radical-card:hover{border-color:var(--green);transform:translateY(-2px)}
.radical-card .r-char{font-size:28px;font-weight:700}
.radical-card .r-name{font-size:10px;color:var(--text3);margin-top:4px}
.radical-card .r-mean{font-size:10px;color:var(--green)}

/* ===== LISTENING ===== */
.listen-btn-big{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--green-dark),var(--green));border:none;font-size:40px;cursor:pointer;transition:.3s;box-shadow:0 8px 30px rgba(0,229,255,.4)}
.listen-btn-big:hover{transform:scale(1.1);box-shadow:0 12px 40px rgba(0,229,255,.6)}
.listen-btn-big:active{transform:scale(.95)}
.pronunciation-toolbar{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap}
.listen-btn-big.slow{background:linear-gradient(135deg,var(--yellow),#ff9f1c);box-shadow:0 8px 30px rgba(255,215,0,.28);font-size:22px;font-weight:900;color:#1d1b12}

/* ===== AI PRACTICE ===== */
.practice-layout{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:16px;align-items:start}
.practice-card{background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius);padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.16)}
.practice-card h3{font-size:16px;font-weight:800;margin-bottom:10px}
.practice-muted{color:var(--text3);font-size:13px;line-height:1.6}
.practice-target{font-size:34px;font-weight:800;line-height:1.35;margin:18px 0;color:var(--text)}
.practice-transcript{min-height:72px;border:1px dashed var(--bg3);border-radius:var(--radius-sm);padding:14px;background:rgba(255,255,255,.03);line-height:1.7}
.mode-switch{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:12px 0}
.mode-switch button{border:1px solid var(--bg3);background:var(--card2);color:var(--text2);border-radius:8px;padding:9px 8px;font-size:12px;font-weight:800;cursor:pointer}
.mode-switch button.active{border-color:var(--green);color:#fff;background:linear-gradient(135deg,var(--green-dark),var(--green))}
.ai-key-row{display:flex;gap:8px;margin-top:10px}
.ai-key-row input{flex:1;min-width:0;padding:10px 12px;border-radius:8px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text)}
.score-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;border:1px solid var(--bg3);background:var(--card2)}
.placement-option{width:100%;text-align:left;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--bg3);background:var(--card);color:var(--text);cursor:pointer;font-size:15px;transition:.2s;margin-bottom:8px}
.placement-option:hover{border-color:var(--green);background:var(--card2)}
.placement-option.correct{border-color:var(--green);background:rgba(88,204,2,.16)}
.placement-option.wrong{border-color:var(--red);background:rgba(255,75,75,.16)}
.placement-progress{height:8px;border-radius:999px;background:var(--bg3);overflow:hidden;margin:12px 0 18px}
.placement-progress .fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue))}
@media(max-width:900px){.practice-layout{grid-template-columns:1fr}.practice-target{font-size:28px}}
</style>

<script>
// ============ DATA ============
const ALL_WORDS = [];
const HSK_LEVELS = [
 {id:1,name:'HSK 1',color:'#58CC02',words:typeof HSK1!=='undefined'?HSK1:[]},
 {id:2,name:'HSK 2',color:'#1CB0F6',words:typeof HSK2!=='undefined'?HSK2:[]},
 {id:3,name:'HSK 3',color:'#FF9600',words:typeof HSK3!=='undefined'?HSK3:[]},
 {id:4,name:'HSK 4',color:'#FF4B4B',words:typeof HSK4!=='undefined'?HSK4:[]},
 {id:5,name:'HSK 5',color:'#CE82FF',words:[...(typeof HSK5_1!=='undefined'?HSK5_1:[]),...(typeof HSK5_2!=='undefined'?HSK5_2:[])]},
 {id:6,name:'HSK 6',color:'#FF86D0',words:[...(typeof HSK6_1!=='undefined'?HSK6_1:[]),...(typeof HSK6_2!=='undefined'?HSK6_2:[])]}
];
HSK_LEVELS.forEach(lv=>lv.desc=lv.name+' - '+lv.words.length+' từ');
HSK_LEVELS.forEach(lv=>{
 lv.words.forEach((w,i)=>{ALL_WORDS.push({id:`${lv.id}-${i}`,hz:w[0],py:w[1],vn:w[2],type:w[3]||'',lessonId:w[4]||null,lessonName:w[5]||'',hsk:lv.id})});
});
const WORDS_PER_LESSON = 8;

function getLessons(hskId){
 const lv = HSK_LEVELS.find(l=>l.id===hskId);
 if(!lv) return [];
 const lessons=[];
 const hasLessonGroups = lv.words.length > 0 && lv.words[0].length >= 6;
 if(hasLessonGroups){
  let lessonMap = {};
  lv.words.forEach((w, i) => {
   let lId = w[4];
   if(!lessonMap[lId]) lessonMap[lId] = { name: w[5], words: [] };
   lessonMap[lId].words.push({id:`${hskId}-${i}`,hz:w[0],py:w[1],vn:w[2],type:w[3]||'',lessonId:w[4],lessonName:w[5],hsk:hskId});
  });
  const keys = Object.keys(lessonMap).sort((a,b)=>parseInt(a)-parseInt(b));
  keys.forEach(k => {
   let chunk = lessonMap[k].words;
   chunk.lessonName = lessonMap[k].name;
   lessons.push(chunk);
  });
 } else {
  for(let i=0;i<lv.words.length;i+=WORDS_PER_LESSON){
   let chunk = lv.words.slice(i,i+WORDS_PER_LESSON).map((w,j)=>({id:`${hskId}-${i+j}`,hz:w[0],py:w[1],vn:w[2],type:w[3]||'',hsk:hskId}));
   chunk.lessonName = `Bài ${(i/WORDS_PER_LESSON)+1}`;
   lessons.push(chunk);
  }
 }
 return lessons;
}

// ============ STATE ============
function createDefaultState(){
 return {completedLessons:{},learnedWords:[],wrongWords:[],bookmarks:[],srs:{},studyLog:[],theme:'dark',aiPractice:{mode:'hybrid',geminiKey:''},placement:null};
}
const DEFAULT_STATE = createDefaultState();
let state;
function isPlainObject(value){
 return !!value && typeof value==='object' && !Array.isArray(value);
}
function normalizeState(parsed){
 const base=createDefaultState();
 if(!isPlainObject(parsed)) return base;
 return {...base,...parsed};
}
function loadState(){
 try{state=normalizeState(JSON.parse(localStorage.getItem('hanzhi_state')))}
 catch(e){localStorage.removeItem('hanzhi_state');state=createDefaultState()}
 if(!isPlainObject(state.completedLessons)) state.completedLessons={};
 if(!Array.isArray(state.learnedWords)) state.learnedWords=[];
 if(!Array.isArray(state.wrongWords)) state.wrongWords=[];
 if(!Array.isArray(state.bookmarks)) state.bookmarks=[];
 if(!isPlainObject(state.srs)) state.srs={};
 if(!Array.isArray(state.studyLog)) state.studyLog=[];
 if(!state.theme) state.theme='dark';
 if(!isPlainObject(state.aiPractice)) state.aiPractice={mode:'hybrid',geminiKey:''};
 if(!['offline','online','hybrid'].includes(state.aiPractice.mode)) state.aiPractice.mode='hybrid';
 if(typeof state.aiPractice.geminiKey!=='string') state.aiPractice.geminiKey='';
 if(!('placement' in state)) state.placement=null;
}
function saveState(){localStorage.setItem('hanzhi_state',JSON.stringify(state))}

// ============ THEME ============
function applyTheme(){
 document.body.classList.remove('light');
 if(state.theme==='light') document.body.classList.add('light');
}
document.getElementById('theme-toggle').addEventListener('click',()=>{
 state.theme = state.theme==='dark'?'light':'dark';
 applyTheme(); saveState();
});

// ============ NAVIGATION ============
const SCREEN_TITLES={home:'🏠 Học tập',vocab:'📖 Từ vựng 5000 từ',grammar:'📚 Ngữ pháp & Lưu ý',pinyin:'🔤 Bảng Pinyin',listening:'🎧 Luyện Nghe',speaking:'🎙️ Luyện Nói',placement:'🧪 Kiểm tra trình độ',writing:'✍️ Luyện Viết Hán Tự',radicals:'🔢 Bộ Thủ',review:'🔄 Ôn tập',game:'🎮 Mini Game',stats:'📊 Thống kê'};
let currentScreen='home';
document.querySelectorAll('.nav-item').forEach(item=>{
 item.addEventListener('click',()=>{
  const s=item.dataset.screen;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  item.classList.add('active');
  document.querySelectorAll('.screen').forEach(sc=>sc.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.getElementById('screen-title').textContent=SCREEN_TITLES[s]||'';
  currentScreen=s;
  if(s==='home') renderHome();
  else if(s==='vocab') renderVocab();
  else if(s==='grammar') renderGrammar();
  else if(s==='pinyin') renderPinyin();
  else if(s==='listening') renderListening();
  else if(s==='speaking') renderSpeaking();
  else if(s==='placement') renderPlacement();
  else if(s==='writing') renderWriting();
  else if(s==='radicals') renderRadicals();
  else if(s==='review') renderReview();
  else if(s==='game') renderGame();
  else if(s==='stats') renderStats();
 });
});

// ============ HOME SCREEN ============
function renderHome(){
 const el=document.getElementById('screen-home');
 let nextLesson = null;
 for(let lv of HSK_LEVELS){
  const lessons = getLessons(lv.id);
  for(let i=0; i<lessons.length; i++){
   if(!state.completedLessons[`${lv.id}-${i}`]){
    nextLesson = {hsk: lv.id, idx: i, name: lv.name + ' - ' + (lessons[i].lessonName || 'Bài ' + (i+1))};
    break;
   }
  }
  if(nextLesson) break;
 }
 // Count SRS due words
 const dueCount = getDueWords().length;

 let html=`
  <div class="dashboard-widgets">
   <div class="widget" role="button" tabindex="0" onclick="${nextLesson ? `startLesson(${nextLesson.hsk}, ${nextLesson.idx})` : ''}" onkeydown="if(event.key==='Enter'||event.key===' '){${nextLesson ? `startLesson(${nextLesson.hsk}, ${nextLesson.idx})` : ''}}" aria-label="${nextLesson ? 'Học tiếp: ' + nextLesson.name : 'Đã hoàn thành tất cả'}">
    <div class="widget-icon">🚀</div>
    <div class="widget-info">
     <h3>Học tiếp</h3>
     <p>${nextLesson ? nextLesson.name : 'Đã hoàn thành tất cả!'}</p>
     <div class="sub">Nhấn để bắt đầu ngay</div>
    </div>
   </div>
   <div class="widget" role="button" tabindex="0" onclick="navigateTo('review')" onkeydown="if(event.key==='Enter'||event.key===' ')navigateTo('review')" aria-label="Ôn tập SRS: ${dueCount} từ cần ôn">
    <div class="widget-icon" style="background:linear-gradient(135deg,var(--orange),var(--yellow))">🔄</div>
    <div class="widget-info">
     <h3>Ôn tập SRS</h3>
     <p>${dueCount} từ cần ôn</p>
     <div class="sub">${dueCount>0?'Nhấn để ôn ngay':'Tốt lắm! 🎉'}</div>
    </div>
   </div>
  </div>
 `;

 HSK_LEVELS.forEach(lv=>{
  const lessons=getLessons(lv.id);
  const completed=lessons.filter((_,i)=>state.completedLessons[`${lv.id}-${i}`]).length;
  const pct=lessons.length?Math.round(completed/lessons.length*100):0;
  html+=`<div class="level-section">
   <div class="level-header">
    <div class="level-badge hsk${lv.id}">${lv.id}</div>
    <div class="level-info"><h2>${lv.name}</h2><p>${lv.desc}</p></div>
    <div class="level-progress"><div class="pct">${pct}%</div><div class="label">${completed}/${lessons.length} bài</div></div>
   </div>
   <div class="lesson-path" id="path-${lv.id}">`;
  lessons.forEach((_,i)=>{
   const key=`${lv.id}-${i}`;
   const done=state.completedLessons[key];
   const prevDone=i===0||(state.completedLessons[`${lv.id}-${i-1}`]);
   const cls=done?'completed':prevDone?'available':'locked';
   if(i>0) html+=`<div class="lesson-connector ${done?'done':''}"></div>`;
   const lTitle = lessons[i].lessonName ? lessons[i].lessonName.replace(/"/g, '&quot;') : `Bài ${i+1}`;
   html+=`<div class="lesson-node ${cls}" data-hsk="${lv.id}" data-lesson="${i}" title="${lTitle}">${i+1}</div>`;
  });
  html+=`</div></div>`;
 });
 el.innerHTML=html;
 el.querySelectorAll('.lesson-node:not(.locked)').forEach(node=>{
  node.addEventListener('click',()=>{
   startLesson(parseInt(node.dataset.hsk),parseInt(node.dataset.lesson));
  });
 });
}

function navigateTo(screen){
 document.querySelectorAll('.nav-item').forEach(i=>{i.classList.remove('active');if(i.dataset.screen===screen) i.classList.add('active')});
 document.querySelectorAll('.screen').forEach(sc=>sc.classList.remove('active'));
 document.getElementById('screen-'+screen).classList.add('active');
 document.getElementById('screen-title').textContent=SCREEN_TITLES[screen]||'';
 currentScreen=screen;
 const fns={home:renderHome,vocab:renderVocab,grammar:renderGrammar,pinyin:renderPinyin,listening:renderListening,speaking:renderSpeaking,placement:renderPlacement,writing:renderWriting,radicals:renderRadicals,review:renderReview,game:renderGame,stats:renderStats};
 if(fns[screen]) fns[screen]();
}

// ============ LESSON ENGINE ============
let lessonData={words:[],questions:[],current:0,correct:0,total:0,hsk:0,lessonIdx:0};

function startLesson(hsk,idx){
 const lessons=getLessons(hsk);
 const words=lessons[idx];
 if(!words||!words.length) return;
 const questions=generateQuestions(words,hsk);
 lessonData={words,questions,current:0,correct:0,total:questions.length,hsk,lessonIdx:idx};
 document.getElementById('main-header').style.display='none';
 document.getElementById('main-nav').style.display='none';
 showQuestion();
}

function shuffle(array){const a=[...array];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

function generateQuestions(words,hsk){
 const qs=[];
 const allLvWords=HSK_LEVELS.find(l=>l.id===hsk).words.map((w,i)=>({hz:w[0],py:w[1],vn:w[2]}));
 words.forEach(w=>{
  qs.push({type:'mc-hv',word:w,distractors:getDistractors(w,allLvWords,'vn',3)});
  qs.push({type:'mc-vh',word:w,distractors:getDistractors(w,allLvWords,'hz',3)});
  qs.push({type:'mc-py',word:w,distractors:getDistractors(w,allLvWords,'py',3)});
  // Fill-in-blank
  if(w.vn.length>2) qs.push({type:'fill-blank',word:w,distractors:getDistractors(w,allLvWords,'hz',3)});
 });
 if(typeof GRAMMAR_DATA!=='undefined'){
  const gData=GRAMMAR_DATA.find(g=>g.level===hsk);
  if(gData&&gData.sentences){
   const sL=shuffle(gData.sentences).slice(0,2);
   sL.forEach(s=>qs.push({type:'sentence-build',sentence:s.parts,vn:s.vn,word:{hz:s.parts.join(''),py:'',vn:s.vn}}));
  }
 }
 for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]]}
 return qs.slice(0, Math.min(12, qs.length));
}

function getDistractors(word,pool,field,n){
 const filtered=pool.filter(w=>w[field]!==word[field]&&w.hz!==word.hz);
 const shuffled=[...filtered].sort(()=>Math.random()-.5);
 return shuffled.slice(0,n).map(w=>w[field]);
}

  });

  ls.querySelectorAll('.word-chip').forEach(chip => {

     selectedOrder.push(chip.dataset.idx);
     updateBuildState();

   });

   const userAns = Array.from(sbArea.children).map(c => c.dataset.val).join('');
   const correctAns = q.sentence.join('');
   checkAnswer(userAns === correctAns, correctAns, q.word, ls);
  });
 }

function checkAnswer(isCorrect,correctAns,word,ls){
 if(isCorrect){
  lessonData.correct++;
  if(!state.learnedWords.includes(word.id)) state.learnedWords.push(word.id);
  state.wrongWords=state.wrongWords.filter(w=>w!==word.id);
  updateSRS(word.id, 5);
 } else {
  if(!state.wrongWords.includes(word.id)) state.wrongWords.push(word.id);
  updateSRS(word.id, 1);
  ls.querySelectorAll('.option').forEach(o=>{
   if(o.dataset.val===correctAns) o.classList.add('correct');
   if(o.classList.contains('selected')&&o.dataset.val!==correctAns) o.classList.add('wrong');
  });
  ls.querySelector('.lesson-body')?.classList.add('shake');
 }
 ls.querySelectorAll('.option').forEach(o=>{
  if(o.dataset.val===correctAns) o.classList.add('correct');
  o.style.pointerEvents='none';
 });
 const banner=document.createElement('div');
 banner.className=`result-banner ${isCorrect?'correct':'wrong'}`;
 banner.innerHTML=`
  <h3>${isCorrect?'🎉 Chính xác!':'❌ Sai rồi!'}</h3>
  <p><span class="cn" style="font-size:18px">${word.hz}</span> (${word.py}) — ${word.vn}</p>
  <button class="btn btn-primary btn-full" id="next-btn">Tiếp tục</button>`;
 ls.appendChild(banner);
 document.getElementById('next-btn').addEventListener('click',()=>{
  banner.remove();
  lessonData.current++;
  showQuestion();
 });
 document.getElementById('check-btn').style.display='none';
}

// ============ SRS (SM-2) ============
function getSRSData(wordId){ return state.srs[wordId] || { interval: 1, ease: 2.5, nextReview: 0, reps: 0 }; }
function updateSRS(wordId, quality){
 let d = getSRSData(wordId);
 if(quality < 3){ d.interval=1; d.reps=0; }
 else {
  d.reps++;
  if(d.reps===1) d.interval=1;
  else if(d.reps===2) d.interval=6;
  else d.interval=Math.round(d.interval * d.ease);
  d.ease = Math.max(1.3, d.ease + 0.1 - (5-quality)*(0.08+(5-quality)*0.02));
 }
 d.nextReview = Date.now() + d.interval * 86400000;
 state.srs[wordId] = d;
}
function getDueWords(){
 const now=Date.now();
 return ALL_WORDS.filter(w=>{ const s=state.srs[w.id]; return s && s.nextReview<=now; });
}

// ============ STUDY LOG ============
function logStudy(correct, total){
 const today = new Date().toISOString().slice(0,10);
 let entry = state.studyLog.find(e=>e.date===today);
 if(!entry){ entry={date:today,words:0,correct:0,total:0}; state.studyLog.push(entry); }
 entry.words += total;
 entry.correct += correct;
 entry.total += total;
 if(state.studyLog.length>90) state.studyLog = state.studyLog.slice(-90);
}

 saveState();
 if(currentScreen==='vocab') renderVocabList();
}

async function callGeminiScoring(prompt){
 const key=state.aiPractice.geminiKey;
 if(!key) throw new Error('Missing Gemini API key');
 const res=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent',{
  method:'POST',
  headers:{'Content-Type':'application/json','x-goog-api-key':key},
  body:JSON.stringify({
   contents:[{role:'user',parts:[{text:prompt}]}],
   generationConfig:{temperature:0.2,maxOutputTokens:220}
  })
 });
 if(!res.ok) throw new Error('Gemini request failed: '+res.status);
 const data=await res.json();
 return data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('').trim()||'';
}

function getSpeechRecognition(){
 return window.SpeechRecognition||window.webkitSpeechRecognition||null;
}

function normalizeSpeechText(text){
 return (text||'').toLowerCase().replace(/[，。！？,.!?;；、\s]/g,'').trim();
}

function scoreSpeechOffline(target, transcript){
 const t=normalizeSpeechText(target);
 const u=normalizeSpeechText(transcript);
 if(!u) return {score:0,label:'Chưa có giọng nói',feedback:'Bấm mic và đọc câu mục tiêu.'};
 if(t===u) return {score:100,label:'Rất chuẩn',feedback:'Bạn đọc khớp hoàn toàn với câu mục tiêu.'};
 const targetChars=[...t];
 const used=new Set();
 let matches=0;
 [...u].forEach(ch=>{
  const idx=targetChars.findIndex((c,i)=>c===ch&&!used.has(i));
  if(idx>=0){used.add(idx);matches++;}
 });
 const lengthPenalty=Math.max(0,Math.abs(t.length-u.length)*4);
 const score=Math.max(0,Math.min(100,Math.round(matches/Math.max(1,t.length)*100-lengthPenalty)));
 const label=score>=82?'Gần chuẩn':score>=55?'Cần luyện thêm':'Chưa khớp';
 const feedback=score>=82?'Phát âm đã gần đúng, thử nghe chậm rồi đọc lại.':score>=55?'Bạn nói đúng một phần, chú ý đủ âm và thứ tự chữ.':'Transcript khác khá nhiều so với mục tiêu.';
 return {score,label,feedback};
}

function getSpeakingPool(){
 const words=ALL_WORDS.filter(w=>w.hsk<=3).slice(0,240).map(w=>({hz:w.hz,py:w.py,vn:w.vn,kind:'Từ vựng'}));
 const sentences=[];
 if(typeof COMM_SENTENCES!=='undefined'){
  COMM_SENTENCES.forEach(cat=>cat.sentences.forEach(s=>{if(sentences.length<60)sentences.push({hz:s[0],py:s[1],vn:s[2],kind:'Mẫu câu'});}));
 }
 return [...words,...sentences];
}

function pickSpeakingTarget(){
 const pool=getSpeakingPool();

 speakingTranscript='';

async function scoreSpeakingTranscript(){
 if(!speakingTarget||!speakingTranscript) return;
 const offline=scoreSpeechOffline(speakingTarget.hz,speakingTranscript);
 const mode=state.aiPractice.mode;
 if((mode==='online'||mode==='hybrid')&&state.aiPractice.geminiKey){
  try{
   const prompt=`Bạn là giáo viên tiếng Trung. Chấm phát âm dựa trên transcript nhận diện giọng nói. Trả lời tiếng Việt trong 2 câu, có điểm 0-100.\nMục tiêu: ${speakingTarget.hz} (${speakingTarget.py}) nghĩa là ${speakingTarget.vn}\nTranscript: ${speakingTranscript}\nĐiểm offline tham khảo: ${offline.score}/100.`;
   const ai=await callGeminiScoring(prompt);
   speakingFeedback={...offline,label:'AI + '+offline.label,feedback:ai||offline.feedback,source:'online'};
  }catch(e){
   speakingFeedback={...offline,feedback:(mode==='online'?'AI lỗi, dùng điểm offline tạm thời. ':'Hybrid fallback offline. ')+offline.feedback,source:'offline'};
  }
 }else{
  speakingFeedback={...offline,source:'offline'};
 }
 renderSpeaking();
}

function startSpeechRecognition(){
 const Recognition=getSpeechRecognition();
 const status=document.getElementById('speech-status');
 if(!Recognition){
  if(status) status.textContent='Trình duyệt chưa hỗ trợ nhận diện giọng nói.';
  return;
 }
 const rec=new Recognition();
 rec.lang='zh-CN';
 rec.interimResults=false;
 rec.maxAlternatives=1;
 if(status) status.textContent='Đang nghe... hãy đọc câu mục tiêu.';
 rec.onresult=e=>{
  speakingTranscript=e.results?.[0]?.[0]?.transcript||'';
  if(status) status.textContent='Đã nhận diện, đang chấm...';
  scoreSpeakingTranscript();
 };
 rec.onerror=e=>{if(status) status.textContent='Không nghe được: '+(e.error||'lỗi microphone');};
 rec.onend=()=>{if(status&&status.textContent.startsWith('Đang nghe')) status.textContent='Đã dừng nghe.';};
 rec.start();
}

let placementQuestions=[];
let placementIndex=0;
let placementAnswers=[];

function buildPlacementQuestions(){
 const questions=[];
 for(let i=0;i<20;i++){
  const hsk=i<18?(i%6)+1:6;
  const pool=ALL_WORDS.filter(w=>w.hsk===hsk);
  const word=pool[Math.floor(Math.random()*pool.length)]||ALL_WORDS[Math.floor(Math.random()*ALL_WORDS.length)];
  const type=['meaning','pinyin','listen'][i%3];
  const field=type==='meaning'?'vn':type==='pinyin'?'py':'hz';
  const distractors=shuffle(ALL_WORDS.filter(w=>w.id!==word.id&&w.hsk===word.hsk)).slice(0,3).map(w=>w[field]);
  const options=shuffle([word[field],...distractors]);
  questions.push({type,hsk,word,field,answer:word[field],options});
 }
 return questions;
}

function startPlacementTest(){
 placementQuestions=buildPlacementQuestions();
 placementIndex=0;
 placementAnswers=[];
 renderPlacementQuestion();
}

function renderPlacement(){
 const el=document.getElementById('screen-placement');
 const latest=state.placement;
 el.innerHTML=`<div class="practice-layout">

   <p class="practice-muted">20 câu trộn từ HSK 1-6: chọn nghĩa, chọn pinyin, nghe chọn chữ. Kết quả lưu trong máy này.</p>
   ${latest?`<div style="margin:16px 0"><span class="score-pill">Gần nhất: ${latest.score}/20 · Gợi ý HSK ${latest.suggestedHsk}</span><p class="practice-muted" style="margin-top:8px">${latest.date}</p></div>`:''}
   <button class="btn btn-primary" id="placement-start">Bắt đầu kiểm tra</button>

  ${renderAiModePanel('placement')}
 </div>`;
 document.getElementById('placement-start').addEventListener('click',()=>startPlacementTest());
 bindAiModePanel('placement',renderPlacement);

function renderPlacementQuestion(){
 const el=document.getElementById('screen-placement');
 const q=placementQuestions[placementIndex];
 if(!q){finishPlacementTest();return;}
 const progress=Math.round(placementIndex/placementQuestions.length*100);
 const prompt=q.type==='meaning'?`Chọn nghĩa của <span class="cn">${q.word.hz}</span>`:q.type==='pinyin'?`Chọn pinyin của <span class="cn">${q.word.hz}</span>`:'Nghe và chọn Hán tự đúng';
 el.innerHTML=`<div class="practice-card" style="max-width:760px;margin:0 auto">
  <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
   <span class="score-pill">Câu ${placementIndex+1}/${placementQuestions.length}</span>
   <span class="score-pill">HSK ${q.hsk}</span>
  </div>
  <div class="placement-progress"><div class="fill" style="width:${progress}%"></div></div>
  <h3>${prompt}</h3>
  ${q.type==='listen'?`<button class="btn btn-primary" id="placement-listen" style="margin:10px 0 16px">🔊 Nghe từ</button>`:`<p class="practice-muted">${q.word.vn}</p>`}
  <div id="placement-options">${q.options.map(o=>`<button class="placement-option" data-answer="${esc(o)}">${o}</button>`).join('')}</div>
  <div id="placement-feedback" style="min-height:44px;margin-top:12px"></div>
 </div>`;
 if(q.type==='listen') document.getElementById('placement-listen').addEventListener('click',()=>speakNormal(q.word.hz));
 el.querySelectorAll('.placement-option').forEach(btn=>btn.addEventListener('click',()=>answerPlacementQuestion(btn.dataset.answer)));
}

function answerPlacementQuestion(answer){
 const q=placementQuestions[placementIndex];
 const correct=answer===q.answer;
 placementAnswers.push({hsk:q.hsk,type:q.type,correct,answer,expected:q.answer});
 document.querySelectorAll('.placement-option').forEach(btn=>{
  btn.disabled=true;
  if(btn.dataset.answer===q.answer) btn.classList.add('correct');
  else if(btn.dataset.answer===answer) btn.classList.add('wrong');
 });
 const fb=document.getElementById('placement-feedback');
 fb.innerHTML=`<p class="practice-muted">${correct?'✅ Đúng':'❌ Sai'} · Đáp án: <b>${q.answer}</b></p><button class="btn btn-primary btn-sm" id="placement-next">${placementIndex+1>=placementQuestions.length?'Xem kết quả':'Câu tiếp theo'}</button>`;
 document.getElementById('placement-next').addEventListener('click',()=>{
  placementIndex++;
  if(placementIndex>=placementQuestions.length) finishPlacementTest();
  else renderPlacementQuestion();
 });
}

function finishPlacementTest(){
 const total=placementAnswers.length;
 const score=placementAnswers.filter(a=>a.correct).length;
 const byHsk={};
 placementAnswers.forEach(a=>{
  if(!byHsk[a.hsk]) byHsk[a.hsk]={right:0,total:0};
  byHsk[a.hsk].total++;
  if(a.correct) byHsk[a.hsk].right++;
 });
 let suggestedHsk=1;
 for(let h=1;h<=6;h++){
  const b=byHsk[h];
  if(b&&b.total&&b.right/b.total>=0.6) suggestedHsk=h;
 }
 state.placement={score,total,suggestedHsk,byHsk,date:new Date().toLocaleString('vi-VN')};
 saveState();
 const rows=Object.keys(byHsk).map(h=>`<div class="hsk-bar"><div class="label">HSK${h}</div><div class="bar"><div class="fill" style="width:${Math.round(byHsk[h].right/byHsk[h].total*100)}%"></div></div><div class="pct">${byHsk[h].right}/${byHsk[h].total}</div></div>`).join('');
 document.getElementById('screen-placement').innerHTML=`<div class="practice-card" style="max-width:760px;margin:0 auto">
  <h3>🎯 Kết quả kiểm tra</h3>
  <div class="practice-target">${score}/${total}</div>
  <p class="practice-muted">Gợi ý học tiếp ở <b>HSK ${suggestedHsk}</b>. Nếu điểm thấp ở một cấp, nên ôn cấp đó trước khi lên cấp cao hơn.</p>
  <div class="hsk-progress" style="margin-top:16px">${rows}</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
   <button class="btn btn-primary" onclick="startPlacementTest()">Làm lại</button>
   <button class="btn btn-secondary" onclick="renderPlacement()">Về màn kiểm tra</button>
  </div>
 </div>`;
}

// ============ REVIEW SCREEN ============
let reviewIdx=0;let reviewWords=[];let reviewFlipped=false;
let reviewMode='flashcard';

function renderReview(){
 const el=document.getElementById('screen-review');
 // Prioritize SRS due words, then learned words
 const due = getDueWords();
 if(due.length>0) reviewWords = shuffle(due);
 else {
  reviewWords=ALL_WORDS.filter(w=>state.learnedWords.includes(w.id));
  if(!reviewWords.length) reviewWords=ALL_WORDS.filter(w=>w.hsk===1).slice(0,20);
  reviewWords.sort(()=>Math.random()-.5);
 }
 reviewIdx=0; reviewFlipped=false;
 showReviewUI(el);
}

function showReviewUI(el){
 const title = reviewMode === 'flashcard' ? '🔄 Ôn Tập Flashcard' : '🧩 Luyện Ghép Câu';
 const btnText = reviewMode === 'flashcard' ? 'Đổi: Ghép Câu' : 'Đổi: Flashcard';
 const dueCount = getDueWords().length;
 let header = `
  <div class="search-box" style="display:flex;justify-content:space-between;align-items:center">
   <div>
    <h2 style="font-size:20px;font-weight:800;margin-bottom:8px">${title}</h2>
    <p style="color:var(--text3);font-size:14px">${reviewMode === 'flashcard' ? 'Nhấn thẻ để lật' : 'Sắp xếp các từ thành câu đúng'}${dueCount>0?` · <span style="color:var(--orange)">${dueCount} từ cần ôn (SRS)</span>`:''}</p>
   </div>
   <button class="btn btn-secondary btn-sm" id="toggle-review-mode">${btnText}</button>
  </div>
  <div id="review-content"></div>`;
 el.innerHTML = header;
 document.getElementById('toggle-review-mode').addEventListener('click', () => {
  reviewMode = reviewMode === 'flashcard' ? 'sentence' : 'flashcard';
  showReviewUI(el);
 });
 const contentEl = document.getElementById('review-content');
 if(reviewMode === 'flashcard') showReviewCard(contentEl);
 else showSentencePractice(contentEl);
}

function showReviewCard(el){
 if(!reviewWords.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--text3)">Chưa có dữ liệu.</div>';return}
 const w=reviewWords[reviewIdx%reviewWords.length];
 reviewFlipped=false;
 const isBM = state.bookmarks.includes(w.id);
 el.innerHTML=`
  <div class="review-card" id="review-card" style="cursor:pointer;min-height:200px;position:relative">
   <span class="bm-star ${isBM?'active':''}" onclick="toggleBookmark('${w.id}',event);showReviewCard(document.getElementById('review-content'))" style="position:absolute;top:16px;right:16px">${isBM?'⭐':'☆'}</span>
   <div class="hanzi cn">${w.hz}</div>
   <div class="pinyin" id="rv-pinyin" style="visibility:hidden">${w.py}</div>
   <div class="meaning" id="rv-meaning" style="visibility:hidden">${w.vn}</div>
   <div style="margin-top:16px;font-size:13px;color:var(--text3)" id="rv-hint">Nhấn để xem đáp án</div>
  </div>
  <div class="review-actions">
   <button class="btn btn-secondary btn-sm" onclick="reviewPrev()">⬅ Trước</button>
   <button class="btn btn-secondary btn-sm" style="color:var(--red)" onclick="updateSRS('${w.id}',1);saveState();reviewNext()">😕 Khó</button>
   <button class="btn btn-secondary btn-sm" style="color:var(--yellow)" onclick="updateSRS('${w.id}',3);saveState();reviewNext()">🤔 Tạm</button>
   <button class="btn btn-secondary btn-sm" style="color:var(--green)" onclick="updateSRS('${w.id}',5);saveState();reviewNext()">😊 Dễ</button>
   <button class="btn btn-primary btn-sm" onclick="reviewNext()">Tiếp ➡</button>
  </div>
  <div style="padding:20px"><h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Từ đã học gần đây</h3></div>
  <div class="word-list" id="learned-list"></div>`;

 document.getElementById('review-card').addEventListener('click',()=>{
  reviewFlipped=!reviewFlipped;
  document.getElementById('rv-pinyin').style.visibility=reviewFlipped?'visible':'hidden';
  document.getElementById('rv-meaning').style.visibility=reviewFlipped?'visible':'hidden';
  document.getElementById('rv-hint').textContent=reviewFlipped?'':'Nhấn để xem đáp án';
  if(reviewFlipped) speakNative(w.hz);
 });

 const list=document.getElementById('learned-list');
 const recent=ALL_WORDS.filter(w=>state.learnedWords.includes(w.id)).slice(-20).reverse();
 list.innerHTML=recent.map(w=>`
  <div class="word-item" onclick="speakNative('${esc(w.hz)}')">
   <span class="hz cn">${w.hz}</span>
   <span class="py">${w.py}</span>
   <span class="mn">${w.vn}</span>
   <span class="hsk-tag" style="background:${HSK_LEVELS.find(l=>l.id===w.hsk)?.color||'#666'}">HSK${w.hsk}</span>
  </div>`).join('');
}
function reviewNext(){reviewIdx=(reviewIdx+1)%reviewWords.length;showReviewCard(document.getElementById('review-content'))}
function reviewPrev(){reviewIdx=(reviewIdx-1+reviewWords.length)%reviewWords.length;showReviewCard(document.getElementById('review-content'))}

let practiceSentence = null;
function showSentencePractice(el) {
 let allSentences = typeof COMM_SENTENCES!=='undefined' ? [...COMM_SENTENCES] : [];
 if(typeof GRAMMAR_DATA!=='undefined') {
  GRAMMAR_DATA.forEach(gd => {
   gd.sentences.forEach(s => {
    allSentences.push({hz: s.parts.join(''), py: '', vn: s.vn, parts: s.parts});
   });
  });
 }
 if(!allSentences.length) { el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Chưa có dữ liệu câu.</div>'; return; }
 practiceSentence = allSentences[Math.floor(Math.random()*allSentences.length)];
 const chips = shuffle(practiceSentence.parts);
 el.innerHTML = `
  <div class="review-card" style="min-height:200px;align-items:flex-start;justify-content:flex-start">
   <div class="question-type" style="margin-bottom:16px;color:var(--green);font-weight:700">Sắp xếp thành câu đúng:</div>
   <div class="question-sub" style="margin-bottom:8px;font-size:18px">${practiceSentence.vn}</div>
   ${practiceSentence.py ? `<div style="text-align:center;color:var(--blue);font-weight:600;margin-bottom:24px;font-size:15px">${practiceSentence.py}</div>` : '<div style="margin-bottom:24px"></div>'}
   <div class="sentence-builder-area" id="rv-sb-area"></div>
   <div class="chip-bank" id="rv-sb-bank">
    ${chips.map((c,i)=>`<div class="word-chip cn" data-val="${esc(c)}" data-idx="${i}">${c}</div>`).join('')}
   </div>
  </div>
  <div id="rv-feedback" style="margin-top:16px;padding:16px;border-radius:var(--radius-sm);display:none;font-weight:700;text-align:center"></div>
  <div class="review-actions" style="margin-top:16px">
   <button class="btn btn-secondary" onclick="showSentencePractice(document.getElementById('review-content'))">Bỏ qua</button>
   <button class="btn btn-primary" id="rv-check-btn" disabled>Kiểm tra</button>
  </div>`;
 const sbArea = document.getElementById('rv-sb-area');
 const sbBank = document.getElementById('rv-sb-bank');
 const checkBtn = document.getElementById('rv-check-btn');
 let selectedOrder = [];
 const updateBuildState = () => { checkBtn.disabled = selectedOrder.length !== chips.length; };
 el.querySelectorAll('.word-chip').forEach(chip => {
  chip.addEventListener('click', () => {
   if(chip.parentElement === sbBank) {
    chip.classList.add('selected');
    const clone = chip.cloneNode(true); clone.classList.remove('selected');
    clone.addEventListener('click', () => { chip.classList.remove('selected'); clone.remove(); selectedOrder = selectedOrder.filter(c => c !== chip.dataset.idx); updateBuildState(); });
    sbArea.appendChild(clone); selectedOrder.push(chip.dataset.idx); updateBuildState();
   }
  });
 });
 checkBtn.addEventListener('click', () => {
  const userAns = Array.from(sbArea.children).map(c => c.dataset.val).join('');
  const correctAns = practiceSentence.hz;
  const fb = document.getElementById('rv-feedback'); fb.style.display = 'block';
  if (userAns === correctAns) {
   fb.style.background = 'rgba(88,204,2,.15)'; fb.style.color = 'var(--green)';
   fb.innerHTML = '✅ Chính xác!<br><span class="cn" style="font-size:24px;margin-top:8px;display:block">' + correctAns + '</span>';
   speakNative(correctAns); checkBtn.textContent = 'Tiếp tục'; checkBtn.onclick = () => showSentencePractice(el);
  } else {
   fb.style.background = 'rgba(255,75,75,.15)'; fb.style.color = 'var(--red)';
   fb.textContent = '❌ Sai rồi, thử lại nhé!'; setTimeout(() => fb.style.display='none', 2000);
  }
 });
}

// ============ MINI GAME (Memory) ============
let gameCards=[];let gameFlipped=[];let gameMatched=[];let gameLock=false;let gameMoves=0;let gameStartTime=0;
function renderGame(){
 const el=document.getElementById('screen-game');
 const pool = shuffle(ALL_WORDS.filter(w=>w.hsk<=3)).slice(0,8);
 const pairs = [];
 pool.forEach(w=>{ pairs.push({id:w.id,type:'hz',display:w.hz,py:w.py,vn:''}); pairs.push({id:w.id,type:'vn',display:w.vn,py:w.py,vn:w.hz}); });
 gameCards = shuffle(pairs);
 gameFlipped = []; gameMatched = new Set(); gameLock = false; gameMoves = 0; gameStartTime = Date.now();

 el.innerHTML=`
  <div style="text-align:center;margin-bottom:20px">
   <p style="color:var(--text3)">Ghép đôi: Hán tự ↔ Nghĩa tiếng Việt</p>
   <div style="display:flex;gap:20px;justify-content:center;margin-top:12px">
    <span style="font-weight:700">Lượt: <span id="game-moves">0</span></span>
    <span style="font-weight:700">Đã ghép: <span id="game-matched">0</span>/8</span>
   </div>
  </div>
  <div class="game-board" id="game-board">
   ${gameCards.map((c,i)=>`<div class="game-card-wrap"><div class="game-card" data-idx="${i}">
    <div class="game-card-face game-card-front">❓</div>
    <div class="game-card-face game-card-back">
     <div class="g-hz ${c.type==='hz'?'cn':''}" style="font-size:${c.type==='hz'?'28px':'14px'}">${c.display}</div>
     ${c.py?`<div class="g-py">${c.py}</div>`:''}
    </div>
   </div></div>`).join('')}
  </div>`;

 el.querySelectorAll('.game-card').forEach(card=>{
  card.addEventListener('click',()=>{
   if(gameLock) return;
   const idx=parseInt(card.dataset.idx);
   if(gameMatched.has(idx)||gameFlipped.includes(idx)) return;
   card.classList.add('flipped');
   gameFlipped.push(idx);
   if(gameFlipped.length===2){
    gameMoves++;
    document.getElementById('game-moves').textContent=gameMoves;
    gameLock=true;
    const [a,b]=gameFlipped;
    if(gameCards[a].id===gameCards[b].id && gameCards[a].type!==gameCards[b].type){
     gameMatched.add(a); gameMatched.add(b);
     el.querySelectorAll(`.game-card[data-idx="${a}"],.game-card[data-idx="${b}"]`).forEach(c=>c.classList.add('matched'));
     document.getElementById('game-matched').textContent=gameMatched.size/2;
     gameFlipped=[]; gameLock=false;
     if(gameMatched.size===gameCards.length){
      setTimeout(()=>{
       const secs=Math.round((Date.now()-gameStartTime)/1000);
       el.querySelector('.game-board').innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px"><div style="font-size:60px;margin-bottom:16px">🎉</div><h2 style="font-size:24px;font-weight:800;margin-bottom:8px">Hoàn thành!</h2><p style="color:var(--text3)">${gameMoves} lượt · ${secs} giây</p><button class="btn btn-primary" style="margin-top:20px" onclick="renderGame()">Chơi lại</button></div>`;
       createConfetti();
      },500);
     }
    } else {
     setTimeout(()=>{
      el.querySelectorAll(`.game-card[data-idx="${a}"],.game-card[data-idx="${b}"]`).forEach(c=>c.classList.remove('flipped'));
      gameFlipped=[]; gameLock=false;
     },800);
    }
   }
  });
 });
}

// ============ STATS SCREEN ============
function renderStats(){
 const el=document.getElementById('screen-stats');
 const totalWords=ALL_WORDS.length;
 const learned=state.learnedWords.length;
 const totalLessons=HSK_LEVELS.reduce((s,l)=>s+getLessons(l.id).length,0);
 const completedL=Object.keys(state.completedLessons).length;
 const bmCount=state.bookmarks.length;
 const dueCount=getDueWords().length;

 let hskBars='';
 HSK_LEVELS.forEach(lv=>{
  const lvWords=ALL_WORDS.filter(w=>w.hsk===lv.id).length;
  const lvLearned=state.learnedWords.filter(id=>id.startsWith(lv.id+'-')).length;
  const pct=lvWords?Math.round(lvLearned/lvWords*100):0;
  hskBars+=`<div class="hsk-bar">
   <div class="label" style="color:${lv.color}">HSK${lv.id}</div>
   <div class="bar"><div class="fill" style="width:${pct}%;background:${lv.color}"></div></div>
   <div class="pct">${pct}%</div>
  </div>`;
 });

 // Chart data (last 14 days)
 const last14 = [];
 for(let i=13;i>=0;i--){
  const d=new Date(); d.setDate(d.getDate()-i);
  const ds=d.toISOString().slice(0,10);
  const entry=state.studyLog.find(e=>e.date===ds);
  last14.push({date:ds, label:d.getDate()+'/'+(d.getMonth()+1), words:entry?entry.words:0, correct:entry?entry.correct:0});
 }
 const maxW = Math.max(1,...last14.map(d=>d.words));

 el.innerHTML=`
  <div style="padding:20px"><h2 style="font-size:20px;font-weight:800">📊 Thống Kê</h2></div>
  <div class="stat-grid">
   <div class="stat-card"><h3>📚 Từ đã học</h3><div class="val" style="color:var(--green)">${learned}/${totalWords}</div></div>
   <div class="stat-card"><h3>✅ Bài hoàn thành</h3><div class="val" style="color:var(--blue)">${completedL}/${totalLessons}</div></div>
   <div class="stat-card"><h3>🔖 Đã bookmark</h3><div class="val" style="color:var(--yellow)">${bmCount}</div></div>
   <div class="stat-card"><h3>🔄 Từ cần ôn (SRS)</h3><div class="val" style="color:var(--orange)">${dueCount}</div></div>
  </div>
  <div class="chart-container">
   <h3 style="font-size:14px;color:var(--text3);margin-bottom:12px">📈 Hoạt động 14 ngày qua</h3>
   <div class="chart-bars">
    ${last14.map(d=>`<div class="chart-bar" style="height:${Math.max(2,d.words/maxW*100)}%"><div class="chart-tip">${d.words} từ</div></div>`).join('')}
   </div>
   <div class="chart-labels">${last14.map(d=>`<span>${d.label}</span>`).join('')}</div>
  </div>
  <div class="hsk-progress">
   <h3 style="font-size:16px;font-weight:700;margin-bottom:12px">Tiến độ theo HSK</h3>
   ${hskBars}
  </div>
  <div style="padding:20px;display:flex;gap:12px;flex-wrap:wrap">
   <button class="btn btn-secondary btn-sm" onclick="exportProgress()">📤 Xuất tiến trình</button>
   <button class="btn btn-secondary btn-sm" onclick="document.getElementById('import-file').click()">📥 Nhập tiến trình</button>
   <input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)">
   <button class="btn btn-secondary btn-sm" onclick="if(confirm('Xóa toàn bộ tiến trình?')){localStorage.removeItem('hanzhi_state');location.reload()}">🗑️ Reset</button>
  </div>`;
}

// ============ EXPORT / IMPORT ============
function exportProgress(){
 const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
 const url = URL.createObjectURL(blob);
 const a = document.createElement('a'); a.href=url; a.download='hanzhi_progress_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
 URL.revokeObjectURL(url);
}
function importProgress(e){
 const file = e.target.files[0]; if(!file) return;
 const reader = new FileReader();
 reader.onload = ev => {
  try{ state = JSON.parse(ev.target.result); saveState(); alert('Nhập thành công! Đang tải lại...'); location.reload(); }
  catch(err){ alert('File không hợp lệ!'); }
 };
 reader.readAsText(file);
}

function getWordTopic(w){
 const txt=(w.vn+' '+w.type).toLowerCase();
 for(const [topic,rx] of TOPIC_RULES){ if(rx.test(txt)) return topic; }
 return '📝 Khác';
}
function sortByTopic(words){
 const topicOrder={};
 TOPIC_RULES.forEach(([t],i)=>topicOrder[t]=i);
 topicOrder['📝 Khác']=999;
 return [...words].sort((a,b)=>{
  const ta=getWordTopic(a), tb=getWordTopic(b);
  if(ta!==tb) return (topicOrder[ta]||999)-(topicOrder[tb]||999);
  return 0;
 });
}

// ============ VOCABULARY BROWSER ============
let vocabCurrentHSK=0;
let vocabSearch='';
let vocabPosFilter='';
let vocabShowBookmarks=false;

function renderVocab(){
 const el=document.getElementById('screen-vocab');
 // Collect unique POS
 const posSet=new Set();
 ALL_WORDS.forEach(w=>{if(w.type) w.type.split('/').forEach(t=>posSet.add(t.trim()))});
 const posList=[...posSet].sort();

 let html=`
  <div class="search-box">
   <input class="search-input" id="vocab-search" placeholder="🔍 Tìm: Hán tự, pinyin, hoặc nghĩa..." value="${vocabSearch}">
  </div>
  <div class="vocab-tabs">
   <div class="vocab-tab ${vocabCurrentHSK===0?'active':''}" data-hsk="0">Tất cả</div>
   ${HSK_LEVELS.map(lv=>`<div class="vocab-tab ${vocabCurrentHSK===lv.id?'active':''}" data-hsk="${lv.id}" style="${vocabCurrentHSK===lv.id?'background:'+lv.color+';border-color:'+lv.color:''}">${lv.name} (${lv.words.length})</div>`).join('')}
   <div class="vocab-tab ${vocabCurrentHSK==='comm'?'active':''}" data-hsk="comm" style="${vocabCurrentHSK==='comm'?'background:var(--pink);border-color:var(--pink)':''}">💬 Mẫu câu</div>
   <div class="vocab-tab ${vocabShowBookmarks?'active':''}" data-hsk="bm" style="${vocabShowBookmarks?'background:var(--yellow);border-color:var(--yellow);color:#333':''}">🔖 Bookmark (${state.bookmarks.length})</div>
  </div>
  <div class="pos-filters" id="pos-filters">
   <span class="pos-pill ${vocabPosFilter===''?'active':''}" data-pos="">Tất cả</span>
   ${posList.slice(0,12).map(p=>`<span class="pos-pill ${vocabPosFilter===p?'active':''}" data-pos="${p}">${p}</span>`).join('')}
  </div>
  <div class="vocab-count" id="vocab-count"></div>
  <div class="vocab-grid" id="vocab-grid"></div>`;
 el.innerHTML=html;
 document.getElementById('vocab-search').addEventListener('input',e=>{vocabSearch=e.target.value;renderVocabList()});
 el.querySelectorAll('.vocab-tab').forEach(t=>{
  t.addEventListener('click',()=>{
   const val=t.dataset.hsk;
   if(val==='bm'){vocabShowBookmarks=!vocabShowBookmarks;vocabCurrentHSK=0;}
   else{vocabShowBookmarks=false;vocabCurrentHSK=val==='comm'?'comm':parseInt(val);}
   renderVocab();
  });
 });
 el.querySelectorAll('.pos-pill').forEach(p=>{
  p.addEventListener('click',()=>{vocabPosFilter=p.dataset.pos;renderVocab()});
 });
 renderVocabList();
}

function pronunciationButtons(text){
 const safeText = esc(text);
 return `<div class="vocab-audio-actions">
  <button class="audio-btn" data-pronounce-mode="normal" onclick="event.stopPropagation();speakNormal('${safeText}')" title="Nghe chuẩn">🔊</button>
  <button class="audio-btn slow" data-pronounce-mode="slow" onclick="event.stopPropagation();speakSlow('${safeText}')" title="Nghe chậm">0.7x</button>
 </div>`;
}

function renderVocabList(){
 const grid=document.getElementById('vocab-grid');
 const countEl=document.getElementById('vocab-count');

 if(vocabCurrentHSK==='comm'){
  let flatSentences = [];
  if (typeof COMM_SENTENCES !== 'undefined') {
   COMM_SENTENCES.forEach(cat => { cat.sentences.forEach(sen => { flatSentences.push({ topic: cat.category, hz: sen[0], py: sen[1], vn: sen[2], type: sen[3]||'' }); }); });
  }
  if(vocabSearch.trim()){
   const q=vocabSearch.trim().toLowerCase();
   flatSentences=flatSentences.filter(s=>s.hz.includes(q)||s.py.toLowerCase().includes(q)||s.vn.toLowerCase().includes(q));
  }
  countEl.textContent=`Hiển thị ${flatSentences.length} câu giao tiếp`;
  const grouped = {};
  flatSentences.forEach(s => { const t = s.topic || 'Khác'; if(!grouped[t]) grouped[t]=[]; grouped[t].push(s); });
  let html = '';
  for(let topic in grouped){
   html += `<div style="grid-column:1/-1;margin-top:24px;margin-bottom:8px;font-size:20px;font-weight:800;color:var(--pink);border-bottom:2px solid var(--bg3);padding-bottom:8px">${topic}</div>`;
   // Pair up Q&A
   const items = grouped[topic];
   let i = 0;
   while(i < items.length){
    const s = items[i];
    const isQ = s.type === 'Q';
    const isA = s.type === 'A';
    const next = items[i+1];
    const hasAnswer = isQ && next && next.type === 'A';
    if(isQ && hasAnswer){
     // Render Q+A as a paired card
     const q2 = s, a = next;
     html += `<div style="grid-column:1/-1;background:var(--card);border:1px solid var(--bg3);border-radius:var(--radius);padding:16px;margin-bottom:4px">
      <div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px dashed var(--bg3)">
       <div style="font-size:11px;font-weight:800;color:var(--blue);letter-spacing:1px;margin-bottom:4px">❓ CÂU HỎI</div>
       <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
         <div class="cn" style="font-size:20px;font-weight:700;color:var(--text)">${q2.hz}</div>
         <div style="font-size:13px;color:var(--green);margin-top:2px">${q2.py}</div>
         <div style="font-size:14px;color:var(--text2);margin-top:2px">${q2.vn}</div>
        </div>
        ${pronunciationButtons(q2.hz)}
       </div>
      </div>
      <div>
       <div style="font-size:11px;font-weight:800;color:var(--green);letter-spacing:1px;margin-bottom:4px">💬 TRẢ LỜI</div>
       <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
         <div class="cn" style="font-size:20px;font-weight:700;color:var(--text)">${a.hz}</div>
         <div style="font-size:13px;color:var(--green);margin-top:2px">${a.py}</div>
         <div style="font-size:14px;color:var(--text2);margin-top:2px">${a.vn}</div>
        </div>
        ${pronunciationButtons(a.hz)}
       </div>
      </div>
     </div>`;
     i += 2;
    } else {
     // Normal sentence card
     html += `<div class="vocab-card" style="flex-direction:column;align-items:flex-start;gap:8px" onclick="speakNormal('${esc(s.hz)}')">
      <div style="display:flex;justify-content:space-between;width:100%;gap:12px"><div class="v-hz cn" style="text-align:left;font-size:18px">${s.hz}</div>${pronunciationButtons(s.hz)}</div>
      <div class="v-py" style="font-size:14px;color:var(--green)">${s.py}</div>
      <div class="v-vn" style="font-size:14px;color:var(--text2);white-space:normal">${s.vn}</div>
     </div>`;
     i++;
    }
   }
  }
  grid.innerHTML = html;
  return;
 }

 let words = vocabShowBookmarks
  ? ALL_WORDS.filter(w=>state.bookmarks.includes(w.id))
  : vocabCurrentHSK===0 ? ALL_WORDS : ALL_WORDS.filter(w=>w.hsk===vocabCurrentHSK);

 if(vocabPosFilter) words=words.filter(w=>w.type && w.type.includes(vocabPosFilter));
 if(vocabSearch.trim()){
  const q=vocabSearch.trim().toLowerCase();
  words=words.filter(w=>w.hz.includes(q)||w.py.toLowerCase().includes(q)||w.vn.toLowerCase().includes(q));
 }
 // Sort by topic
 words = sortByTopic(words);
 countEl.textContent=`Hiển thị ${words.length} từ`;
 let lastTopic = '';
 grid.innerHTML=words.map((w,i)=>{
  const color=HSK_LEVELS.find(l=>l.id===w.hsk)?.color||'#666';
  const isBM=state.bookmarks.includes(w.id);
  const topic = getWordTopic(w);
  let header = '';
  if(topic !== lastTopic){ lastTopic=topic; header=`<div style="grid-column:1/-1;margin-top:20px;margin-bottom:4px;font-size:16px;font-weight:800;color:var(--green);border-bottom:2px solid var(--bg3);padding-bottom:6px">${topic}</div>`; }
  return header+`<div class="vocab-card" onclick="speakNormal('${esc(w.hz)}')">
   <div class="vocab-num">${i+1}</div>
   <div class="v-hz cn">${w.hz}</div>
   <div class="v-info"><div class="v-py" style="display:flex;align-items:center;gap:6px">${w.py}${w.type?'<span style="font-size:11px;padding:2px 6px;background:rgba(255,255,255,0.15);border-radius:4px;color:var(--text3)">'+w.type+'</span>':''}</div><div class="v-vn">${w.vn}</div></div>
   <span class="bm-star ${isBM?'active':''}" onclick="toggleBookmark('${w.id}',event)">${isBM?'⭐':'☆'}</span>
   ${pronunciationButtons(w.hz)}
  </div>`;
 }).join('');
}

// ============ UTILITIES ============
let currentNativeAudio = null;
const PRONUNCIATION_SOURCE = 'systemFirst';
const PRONUNCIATION_RATES = { normal: 0.88, slow: 0.68, verySlow: 0.55 };

function stopChineseAudio(){
 if(currentNativeAudio) { currentNativeAudio.pause(); currentNativeAudio.currentTime=0; currentNativeAudio=null; }
 if('speechSynthesis' in window) speechSynthesis.cancel();
}

function speakChinese(text, options={}){
 if(!text || text.trim()==='') return;
 const mode = options.mode || 'normal';
 const rate = options.rate || PRONUNCIATION_RATES[mode] || PRONUNCIATION_RATES.normal;
 stopChineseAudio();
 const preferSystemVoice = PRONUNCIATION_SOURCE === 'systemFirst' && !!zhVoice;
 if(preferSystemVoice){
  speakWithSystemVoice(text, rate);
  return;
 }
 const url = "https://translate.googleapis.com/translate_tts?client=gtx&ie=UTF-8&tl=zh-CN&q=" + encodeURIComponent(text);
 currentNativeAudio = new Audio(url);
 currentNativeAudio.volume=1;
 currentNativeAudio.playbackRate = rate;
 currentNativeAudio.play().catch(e => { console.warn("Native audio failed, using browser voice:", e); speakWithSystemVoice(text, rate); });
}

function speakWithSystemVoice(text, rate){
 speak(text, { rate, volume:1 });
}

function speakNormal(text){ speakChinese(text, { mode:'normal' }); }
function speakSlow(text){ speakChinese(text, { mode:'slow' }); }
function speakNative(text){ speakNormal(text); }

let zhVoice=null;
function loadChineseVoice(){
 if(!('speechSynthesis' in window)) return;
 const pickVoice=()=>{
 const voices=speechSynthesis.getVoices();
  zhVoice=voices.find(v=>v.lang==='zh-CN'&&/xiaoxiao|huihui|yunxi|xiaoyi|xiaobei|xiaoni|xiaorui|xiaoxuan|tingting|mandarin|putonghua|普通话|中文/i.test(v.name))
   ||voices.find(v=>v.lang==='zh-CN'&&/google|microsoft|natural|online/i.test(v.name))
   ||voices.find(v=>v.lang==='zh-CN')
   ||voices.find(v=>v.lang.startsWith('zh'))
   ||null;
 };
 pickVoice();
 speechSynthesis.onvoiceschanged=pickVoice;
}
loadChineseVoice();

function speak(text, options={}){
 if(!('speechSynthesis' in window)) return;
 speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(text);
 u.lang='zh-CN'; u.rate=options.rate || 0.85; u.pitch=1;
 u.volume=1;
 if(zhVoice) u.voice=zhVoice;
 speechSynthesis.speak(u);
}

function createConfetti(){
 const c=document.createElement('div');c.className='confetti';document.body.appendChild(c);
 const colors=['#58CC02','#FFD700','#FF4B4B','#1CB0F6','#CE82FF','#FF86D0'];
 for(let i=0;i<50;i++){
  const p=document.createElement('div');
  Object.assign(p.style,{position:'absolute',width:8+'px',height:8+'px',background:colors[Math.floor(Math.random()*colors.length)],
   left:Math.random()*100+'%',top:-10+'px',borderRadius:Math.random()>.5?'50%':'0',
   animation:`confettiFall ${1+Math.random()*2}s ease-out forwards`,animationDelay:Math.random()*.5+'s'});
  c.appendChild(p);
 }
 if(!document.getElementById('confetti-style')){
  const s=document.createElement('style');s.id='confetti-style';
  s.textContent='@keyframes confettiFall{to{top:100vh;opacity:0;transform:rotate(720deg) translateX('+(Math.random()*200-100)+'px)}}';
  document.head.appendChild(s);
 }
 setTimeout(()=>c.remove(),3000);
}

// ============ PWA ============
if('serviceWorker' in navigator){
 const SW_VERSION='hanzhi-v11';
 let reloadedForServiceWorker=false;
 navigator.serviceWorker.addEventListener('controllerchange',()=>{
  if(reloadedForServiceWorker) return;
  reloadedForServiceWorker=true;
  location.reload();
 });
 navigator.serviceWorker.register(`sw.js?v=${SW_VERSION}`).then(registration=>{
  registration.update().catch(()=>{});
  if(registration.waiting){
   registration.waiting.postMessage({type:'SKIP_WAITING'});
  }
  registration.addEventListener('updatefound',()=>{
   const worker=registration.installing;
   if(!worker) return;
   worker.addEventListener('statechange',()=>{
    if(worker.state==='installed' && navigator.serviceWorker.controller){
     worker.postMessage({type:'SKIP_WAITING'});
    }
   });
  });
 }).catch(()=>{});
}

 </div>`;
}
